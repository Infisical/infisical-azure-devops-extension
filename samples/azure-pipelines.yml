trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  INFISICAL_PROJECT_ID: <your-project-id>

steps:
  - task: InfisicalSecrets@0
    displayName: Fetch secrets from Infisical
    inputs:
      infisicalConnection: my-infisical-connection
      projectId: $(INFISICAL_PROJECT_ID)
      environment: dev
      secretPath: /

  - script: |
      echo "DATABASE_URL is set: ${DATABASE_URL:+yes}"
      echo "API_KEY is set: ${API_KEY:+yes}"
    displayName: Use the fetched secrets
    env:
      DATABASE_URL: $(DATABASE_URL)
      API_KEY: $(API_KEY)

  # identityId is configured on the my-infisical-oidc-connection service connection, not here.
  - task: InfisicalSecrets@0
    displayName: Fetch secrets via OIDC
    inputs:
      infisicalConnection: my-infisical-oidc-connection
      azureSubscription: 'my-azure-wif-connection'
      projectId: $(INFISICAL_PROJECT_ID)
      environment: dev
