# .github/workflows/publish-extension.yml
name: Publish Azure DevOps Extension

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v1, Feb 6, 2026

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.04
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run package-extension 

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to Marketplace
        run: |
          tfx extension publish \
            --manifest-globs vss-extension.json \
            --token ${{ secrets.AZURE_DEVOPS_PAT }} \
            --override '{"version":"${{ steps.version.outputs.version }}"}'
